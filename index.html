<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand py-2 nav-custom">
        <div class="container-fluid px-4 d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold fs-4 text-white m-0" href="#">
                <span class="text-danger">L</span>ibrary
            </a>
            <div class="d-flex align-items-center">
                <ul class="navbar-nav flex-row gap-2 gap-md-3">
                    <li class="nav-item"><a class="nav-link px-2 text-white active-link" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link px-2 text-white" href="#">Catalog</a></li>
                    <li class="nav-item"><a class="nav-link px-2 text-white" href="#">Fav Books</a></li>
                    <li class="nav-item"><a class="nav-link px-2 text-white" href="#">Contact Us</a></li>
                    <li class="nav-item"><a class="nav-link px-2 text-white" href="#">Login/register</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-auto py-5 flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="row justify-content-center w-100">
             <div class="col-12 col-md-6 col-lg-4">
                
                <div class="card shadow-sm border-0 mx-auto">
                     <div id="loginsection" class="p-4">
                        <h3 class="text-center mb-4">Login</h3>
                        <form id="loginform">
                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" id="loginemail" class="form-control" placeholder=" Enter your email" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" id="loginpassword" class="form-control" placeholder=" Enter your password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Login</button>
                        </form>
                        <p class="text-center mt-3 small">Don't have an account? <a href="#" id="toregister">Sign Up</a></p>
                    </div>

                     <div id="registersection" class="hidden p-4">
                        <h3 class="text-center mb-4">Create Account</h3>
                        <form id="registerform">
                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email" id="registeremail" class="form-control" placeholder=" Enter your email" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" id="registerpassword" class="form-control" placeholder="••••••••" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Register</button>
                        </form>
                        <p class="text-center mt-3 small">Already have an account? <a href="#" id="tologin">Login</a></p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <footer class="footer-custom text-light py-3 mt-auto">
    <div class="container">
        <div class="social-links">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-whatsapp"></i></a>
        </div>
    </div>
</footer>

    <script src="main.js"></script>
</body>
</html>
